141],[226,0.1436],[228,0.1465],[230,0.1497],[232,0.1532],[234,0.1528],[236,0.1495],[238,0.1464],[240,0.1437],[242,0.1413],[244,0.139],[246,0.1371],[248,0.1353],[250,0.1338],[252,0.1324],[254,0.1312],[256,0.1302],[258,0.1294],[260,0.1287],[262,0.1283],[264,0.1279],[266,0.1277],[268,0.1277],[270,0.1278],[272,0.1281],[274,0.1286],[276,0.1292],[278,0.13],[280,0.1309],[282,0.132],[284,0.1333],[286,0.1348],[288,0.1365],[290,0.1384],[292,0.1406],[294,0.143],[296,0.1456],[298,0.1485],[300,0.1518],[302,0.1554],[304,0.1593],[306,0.1637],[308,0.1685],[310,0.1738],[312,0.1797],[314,0.1863],[316,0.1936],[318,0.2018],[320,0.2109],[322,0.2212],[324,0.2328],[326,0.2461],[328,0.2583],[330,0.2474],[332,0.2375],[334,0.2286],[336,0.2204],[338,0.2131],[340,0.2064],[342,0.2002],[344,0.1947],[346,0.1896],[348,0.185],[350,0.1807],[352,0.1769],[354,0.1734],[356,0.1702],[358,0.1673],[360,0.1647]]};
    const PALETTE  = [{"name":"cherry","hue":1.0,"maxC":0.2131,"color":"#e83d82"},{"name":"red","hue":25.1,"maxC":0.1991,"color":"#ef4d4c"},{"name":"orange","hue":48.9,"maxC":0.176,"color":"#fd802f"},{"name":"brown","hue":48.9,"maxC":0.1109,"color":"#a55c32"},{"name":"amber","hue":73.1,"maxC":0.1527,"color":"#fdb13d"},{"name":"yellow","hue":96.9,"maxC":0.1564,"color":"#fbdd52"},{"name":"lime","hue":121.1,"maxC":0.1677,"color":"#b9d84c"},{"name":"green","hue":145.0,"maxC":0.1787,"color":"#5ed067"},{"name":"mint","hue":169.0,"maxC":0.1445,"color":"#1bc99d"},{"name":"cyan","hue":193.0,"maxC":0.1256,"color":"#19bdba"},{"name":"turquoise","hue":216.9,"maxC":0.1219,"color":"#17b1d0"},{"name":"sky","hue":240.7,"maxC":0.1535,"color":"#14a2ed"},{"name":"blue","hue":265.1,"maxC":0.1852,"color":"#5a89fc"},{"name":"indigo","hue":289.0,"maxC":0.2128,"color":"#896afc"},{"name":"purple","hue":313.0,"maxC":0.2288,"color":"#af47df"},{"name":"pink","hue":337.0,"maxC":0.2268,"color":"#d33ab6"}];
    const REVERSAL = [{"name":"red","hue":25.9,"chroma":0.2211,"hex":"#f83f3f"},{"name":"yellow","hue":96.4,"chroma":0.1737,"hex":"#ffdc32"},{"name":"green","hue":133.5,"chroma":0.1982,"hex":"#7dcd32"},{"name":"blue","hue":251.4,"chroma":0.1747,"hex":"#329bff"},{"name":"purple","hue":303.5,"chroma":0.2671,"hex":"#a53cff"}];
    const PURPLE_PREVIEWS = [{"label":"×0.9","hue":313.0,"maxC":0.2059},{"label":"×0.85","hue":313.0,"maxC":0.1945}];

    const W = 940, H = 500;
    const PAD = { top: 36, right: 30, bottom: 56, left: 58 };
    const CW = W - PAD.left - PAD.right;
    const CH = H - PAD.top - PAD.bottom;
    const MAX_C = 0.40;

    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');

    function hx(h) { return PAD.left + (h / 360) * CW; }
    function cy(c) { return PAD.top  + CH - (c / MAX_C) * CH; }

    // Hue background
    for (let h = 0; h < 360; h++) {
      const x = hx(h);
      const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + CH);
      grad.addColorStop(0,   `oklch(0.68 0.18 ${h} / 0.10)`);
      grad.addColorStop(1,   `oklch(0.68 0.18 ${h} / 0.00)`);
      ctx.fillStyle = grad;
      ctx.fillRect(x, PAD.top, CW / 360 + 1, CH);
    }

    // Grid — chroma
    ctx.setLineDash([3, 5]);
    ctx.lineWidth = 1;
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    for (let c = 0; c <= MAX_C + 0.001; c += 0.05) {
      ctx.strokeStyle = c === 0 ? '#636366' : '#3a3a3c';
      ctx.beginPath(); ctx.moveTo(PAD.left, cy(c)); ctx.lineTo(PAD.left + CW, cy(c)); ctx.stroke();
      if (c > 0) {
        ctx.fillStyle = '#636366';
        ctx.fillText(c.toFixed(2), PAD.left - 6, cy(c) + 4);
      }
    }

    // Grid — hue
    ctx.textAlign = 'center';
    for (let h = 0; h <= 360; h += 30) {
      ctx.strokeStyle = '#3a3a3c';
      ctx.beginPath(); ctx.moveTo(hx(h), PAD.top); ctx.lineTo(hx(h), PAD.top + CH); ctx.stroke();
      ctx.fillStyle = '#636366';
      ctx.fillText(h + '°', hx(h), PAD.top + CH + 18);
    }
    ctx.setLineDash([]);

    // Axes
    ctx.strokeStyle = '#48484a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(PAD.left, PAD.top);
    ctx.lineTo(PAD.left, PAD.top + CH);
    ctx.lineTo(PAD.left + CW, PAD.top + CH);
    ctx.stroke();

    // Axis labels
    ctx.fillStyle = '#8e8e93';
    ctx.font = '12px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Hue (°)', PAD.left + CW / 2, H - 10);
    ctx.save();
    ctx.translate(14, PAD.top + CH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Chroma (C)', 0, 0);
    ctx.restore();

    // sRGB gamut bands
    const lLabels = Object.keys(GAMUT);
    const lColors = ['rgba(255,255,255,0.10)', 'rgba(255,255,255,0.18)', 'rgba(255,255,255,0.10)'];
    lLabels.forEach((lkey, i) => {
      const pts = GAMUT[lkey];
      ctx.beginPath();
      pts.forEach(([h, c], j) => {
        j === 0 ? ctx.moveTo(hx(h), cy(c)) : ctx.lineTo(hx(h), cy(c));
      });
      ctx.strokeStyle = lColors[i];
      ctx.lineWidth = i === 1 ? 2 : 1;
      ctx.setLineDash(i === 1 ? [] : [4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    });

    // Palette line
    const sorted = [...PALETTE].sort((a, b) => a.hue - b.hue);
    ctx.beginPath();
    sorted.forEach((f, i) => {
      i === 0 ? ctx.moveTo(hx(f.hue), cy(f.maxC)) : ctx.lineTo(hx(f.hue), cy(f.maxC));
    });
    ctx.strokeStyle = '#67bbf6';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Palette dots + labels
    sorted.forEach(f => {
      const x = hx(f.hue), y = cy(f.maxC);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = f.color || '#67bbf6';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.fillStyle = '#aeaeb2';
      ctx.font = '9px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.name, x, y - 9);
    });

    // Reversal T4 dots
    REVERSAL.forEach(r => {
      const x = hx(r.hue), y = cy(r.chroma);
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fillStyle = r.hex;
      ctx.fill();
      ctx.strokeStyle = '#ff9f43';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = '#ff9f43';
      ctx.font = 'bold 10px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(r.name, x, y + 20);
    });

    // Purple reduction previews
    const previewColors = ['#c084fc', '#a855f7'];
    PURPLE_PREVIEWS.forEach((p, i) => {
      const x = hx(p.hue), y = cy(p.maxC);
      // Dashed horizontal line from current purple dot
      const purpleDot = PALETTE.find(f => f.name === 'purple');
      ctx.beginPath();
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = previewColors[i];
      ctx.lineWidth = 1.5;
      ctx.moveTo(hx(purpleDot.hue), cy(purpleDot.maxC));
      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = previewColors[i];
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.fillStyle = previewColors[i];
      ctx.font = '10px -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(p.label, x + 8, y + 4);
    });
