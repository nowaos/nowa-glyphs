# Auditoria: GNOME Core Apps
# Para cada app: arquivo atual em src/, nome canônico (org.gnome.*) e todos os aliases em links/.
# already_canonical: true = arquivo já tem o nome correto, sem renomeação necessária.
# aliases: links que apontam para o mesmo arquivo (continuarão existindo após renomeação).
# migrated: true = arquivo movido para gnome-core/ com nome canônico, symlinks atualizados.

